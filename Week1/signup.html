<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <h1>User Registration</h1>
    <form>
      <h3>Personal details</h3>
      <div class="form-group">
        <label>First Name:</label>
        <input type="text" />
      </div>

      <div class="form-group">
        <label>Last Name:</label>
        <input type="text" />
      </div>

      <div class="form-group">
        <label>Age</label>
        <input type="number" />
      </div>

      <div class="form-group">
        <label>Gender</label>
        <select>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </div>

      <div class="button-group">
        <label>Profile Picture</label>
        <input type="file" />
      </div>

      <h3>Account Details</h3>
      <div class="form-group">
        <label>Email:</label>
        <input type="email" />
      </div>

      <div class="form-group">
        <label>Password:</label>
        <input type="password" />
      </div>

      <div class="radio-group">
        <label>Role:</label>
        <input type="radio" /><label>Admin</label> <input type="radio" /><label
          >User</label
        >
      </div>

      <div class="checkbox-group">
        <input type="checkbox" />
        <label>I accept all the terms and policies</label>
      </div>

      <div class="button-group">
        <button>Register</button>
        <button>Reset</button>
      </div>
    </form>
    <footer>©2026 My Todo List. All rights reserved.</footer>
  </body>
</html>
