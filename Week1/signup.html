<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>User Registration</h1>

    <h3>Personal details</h3>
    <form>
      <div>
        <label>First Name:</label>
        <input type="text" />
      </div>

      <div>
        <label>Last Name:</label>
        <input type="text" />
      </div>

      <div>
        <label>Age</label>
        <input type="number" />
      </div>

      <div>
        <label>Gender</label>
        <select>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </div>

      <div>
        <label>Profile Picture</label>
        <input type="file" />
      </div>
    </form>

    <h3>Account Details</h3>
    <form>
      <div>
        <label>Email:</label>
        <input type="email" />
      </div>

      <div>
        <label>Password:</label>
        <input type="password" />
      </div>

      <div>
        <label>Role:</label>
        <input type="radio" /><label>Admin</label> <input type="radio" /><label
          >User</label
        >
      </div>

      <div>
        <input type="checkbox" />
        <label>I accept all the terms and policies</label>
      </div>
    </form>

    <button>Register</button>
    <button>Reset</button>

    <footer>©2026 My Todo List. All rights reserved.</footer>
  </body>
</html>
